<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/iskra.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/tonik.css">
</head>

<body>
    <section class="iskra" id="iskra" style="display: none;">
        <div class="box">
            <div class="name">искра-видео-2</div>
            <ul class="list">
                <li class="circle circle-active">
                    <p>Питание</p>
                </li>
                <li class="circle" id="wanted">
                    <p>Розыск</p>
                </li>
            </ul>
            <div class="box-speed">
                <p class="speed" id="speed">Опред</p>
                <p class="text">Скорость</p>
            </div>
            <div class="information">
                <p class="name-car" id="name-car">Поиск</p>
                <p class="number-car" id="number-car">Поиск</p>
                <p class="text">Информация о Т/С</p>
            </div>
        </div>
    </section>
    <section class="tonik" id="tonik" style="display:none">
        <div class="box">
            <div class="name">тоник-2</div>
            <ul class="list">
                <li class="circle circle-active">
                    <p>Питание</p>
                </li>
                <li class="circle animation-tonik" id="zamer">
                    <p>Замер</p>
                </li>
                <div class="box-toner">
                    <p class="toner" id="toner">Опред</p>
                    <p class="text">Пропускаемость света</p>
                </div>
            </ul>
        </div>
    </section>    
    <script src="js/iskra.js"></script>
</body>
</html>
